{% extends 'base.html' %}
{% block title %}Delete Product — Webo{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="card p-4 text-center" style="max-width:440px;width:100%;">
    <div style="width:60px;height:60px;background:#fff0f0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin: 0 auto 1rem;">
      <i class="bi bi-trash3 text-danger fs-3"></i>
    </div>
    <h4 style="font-weight:700;">Delete Product?</h4>
    <p class="text-muted">Are you sure you want to delete <strong>"{{ product.title }}"</strong>? This action cannot be undone.</p>
    <form method="post" class="d-flex gap-2 mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger flex-grow-1">
        <i class="bi bi-trash me-1"></i>Yes, Delete
      </button>
      <a href="{% url 'products:list' %}" class="btn btn-outline-secondary flex-grow-1">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
